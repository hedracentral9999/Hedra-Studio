{% extends "base.html" %}
{% block title %}Quên mật khẩu — TTS App{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 -mt-8">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🔑</div>
      <h1 class="text-2xl font-bold text-gray-800">Quên mật khẩu</h1>
      <p class="text-gray-500 text-sm mt-1">Nhập email để nhận link đặt lại mật khẩu</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-5 text-sm">
      {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 mb-5 text-sm">
      {{ success }}
    </div>
    {% endif %}

    <form method="post" action="/forgot" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
        Gửi link đặt lại
      </button>
    </form>

    <div class="mt-5 text-center text-sm text-gray-500">
      <a href="/login" class="text-indigo-600 hover:underline">← Quay lại đăng nhập</a>
    </div>
  </div>
</div>
{% endblock %}
