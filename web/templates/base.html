<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TTS App{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition; }
    textarea { resize: vertical; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  {% if user %}
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <a href="/" class="text-indigo-600 font-bold text-lg">🎙 TTS Studio</a>
    <div class="flex items-center gap-4 text-sm">
      <span class="text-gray-500">{{ user.email }}</span>
      <a href="/settings" class="text-gray-600 hover:text-indigo-600 font-medium">⚙️ Cài đặt</a>
      <a href="/logout" class="text-gray-400 hover:text-red-500">Đăng xuất</a>
    </div>
  </nav>
  {% endif %}

  <main class="{% block main_class %}max-w-2xl mx-auto px-4 py-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
