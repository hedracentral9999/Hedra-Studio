name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_build.txt
          choco install innosetup -y

      - name: Read version
        id: version
        run: |
          $ver = python -c "from version import VERSION; print(VERSION)"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller TTS.spec --clean --noconfirm

      - name: Build installer with Inno Setup
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" setup.iss

      - name: Rename output artifacts
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $portable = "dist\Hedra Studio.exe"
          $portableDst = "Hedra-Studio-$ver-win-portable.exe"
          Copy-Item $portable $portableDst
          $installer = "Hedra-Studio-$ver-win-setup.exe"
          echo "PORTABLE_NAME=$portableDst" >> $env:GITHUB_OUTPUT
          echo "INSTALLER_NAME=$installer" >> $env:GITHUB_OUTPUT
        id: rename

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename.outputs.PORTABLE_NAME }}
            ${{ steps.rename.outputs.INSTALLER_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
