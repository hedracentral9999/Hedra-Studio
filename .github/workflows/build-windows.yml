name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller PyQt6 requests elevenlabs

      - name: Read version
        id: version
        run: |
          $ver = python -c "from version import VERSION; print(VERSION)"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller TTS.spec --clean --noconfirm

      - name: Rename output EXE
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $src = "dist\Hedra Studio.exe"
          $dst = "Hedra-Studio-$ver-win.exe"
          Move-Item $src $dst
          echo "EXE_NAME=$dst" >> $env:GITHUB_OUTPUT
        id: rename

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
