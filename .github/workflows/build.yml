name: Build Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Mac .dmg ─────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Read version
        id: ver
        run: echo "VERSION=$(python3 -c 'from version import VERSION; print(VERSION)')" >> $GITHUB_OUTPUT

      - name: Static checks
        run: |
          python3 -m py_compile app_utils.py main_window.py app_workers.py app_constants.py settings_dialog.py tts_app.py app_dialogs.py auto_video_workers.py app_icons.py version.py scripts/security_audit_release.py
          git diff --check
          python3 scripts/security_audit_release.py --source .

      - name: Build .app
        run: pyinstaller TTS.spec --clean --noconfirm

      - name: Security audit app bundle
        run: python3 scripts/security_audit_release.py --artifact "dist/Hedra Studio.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Hedra Studio" \
            --window-pos 200 120 \
            --window-size 550 380 \
            --icon-size 100 \
            --icon "Hedra Studio.app" 150 180 \
            --hide-extension "Hedra Studio.app" \
            --app-drop-link 400 180 \
            "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg" \
            "dist/Hedra Studio.app"

      - name: Verify and checksum DMG
        run: |
          hdiutil verify "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg"
          shasum -a 256 "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg" > SHA256SUMS-macOS.txt

      - name: Security audit DMG
        run: python3 scripts/security_audit_release.py --artifact "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg
            SHA256SUMS-macOS.txt
          generate_release_notes: true

  # ── Build Windows .exe installer ──────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_build.txt

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = python -c "from version import VERSION; print(VERSION)"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Static checks
        shell: pwsh
        run: |
          python -m py_compile app_utils.py main_window.py app_workers.py app_constants.py settings_dialog.py tts_app.py app_dialogs.py auto_video_workers.py app_icons.py version.py scripts/security_audit_release.py
          git diff --check
          python scripts/security_audit_release.py --source .

      - name: Build .exe
        run: pyinstaller TTS.spec --clean --noconfirm

      - name: Verify dist output
        shell: pwsh
        run: |
          Write-Host "=== dist contents ==="
          Get-ChildItem dist -Recurse | Select-Object FullName, Length
          if (-not (Test-Path 'dist\Hedra Studio.exe')) {
            Write-Error "dist\Hedra Studio.exe NOT FOUND"; exit 1
          }

      - name: Security audit portable EXE
        shell: pwsh
        run: python scripts/security_audit_release.py --artifact "dist\Hedra Studio.exe"

      - name: Create installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss
          options: /O+

      - name: Checksum installer
        shell: pwsh
        run: |
          $file = "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-win-setup.exe"
          Get-FileHash -Algorithm SHA256 $file | ForEach-Object { "$($_.Hash.ToLower())  $file" } | Set-Content SHA256SUMS-Windows.txt

      - name: Security audit installer
        shell: pwsh
        run: python scripts/security_audit_release.py --artifact "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-win-setup.exe"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hedra-Studio-${{ steps.ver.outputs.VERSION }}-win-setup.exe
            SHA256SUMS-Windows.txt
