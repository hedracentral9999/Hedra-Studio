name: Build Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Mac .dmg ─────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller PyQt6 requests

      - name: Read version
        id: ver
        run: echo "VERSION=$(python3 -c 'from version import VERSION; print(VERSION)')" >> $GITHUB_OUTPUT

      - name: Build .app
        run: pyinstaller TTS.spec --clean --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Hedra Studio" \
            --window-pos 200 120 \
            --window-size 550 380 \
            --icon-size 100 \
            --icon "TTS Studio.app" 150 180 \
            --hide-extension "TTS Studio.app" \
            --app-drop-link 400 180 \
            "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg" \
            "dist/TTS Studio.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-mac.dmg"
          generate_release_notes: true

  # ── Build Windows .exe installer ──────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller PyQt6 requests

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = python -c "from version import VERSION; print(VERSION)"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build .exe
        run: pyinstaller TTS.spec --clean --noconfirm

      - name: Create installer (Inno Setup)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss'

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "Hedra-Studio-${{ steps.ver.outputs.VERSION }}-win-setup.exe"
